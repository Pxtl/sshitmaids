name: Build and Publish

on:
  push:
    tags:
      - 'v*.*.*'

env:
  REGISTRY: ghcr.io
  ACTOR: '${{ github.actor }}'
  REPOSITORY: ${{ github.repository }}
  
jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Set envs
        run: |
          echo "ACTOR_LOWERCASE=${ACTOR,,}" >> $GITHUB_ENV
          echo "RELEASE_VERSION=${GITHUB_REF#refs/*/}" >> $GITHUB_ENV
          echo "REPOSITORY_LOWERCASE=${REPOSITORY,,}" >> $GITHUB_ENV

      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ env.ACTOR_LOWERCASE }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: ./container
          file: ./container/Dockerfile
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.REPOSITORY_LOWERCASE }}:main
            ${{ env.REGISTRY }}/${{ env.REPOSITORY_LOWERCASE }}:latest
            ${{ env.REGISTRY }}/${{ env.REPOSITORY_LOWERCASE }}:${{ env.RELEASE_VERSION }}
